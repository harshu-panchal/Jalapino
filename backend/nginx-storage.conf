# nginx-storage.conf
# Include this inside your server block in Nginx

# Serve images and static media from VPS local storage
location /images/ {
    # Replace /var/storage with your actual base storage path
    alias /var/storage/;
    
    # Enable caching for 1 year
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    
    # Security: Prevent execution of scripts inside storage folders
    location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
        deny all;
    }

    # Allow cross-origin access if serving to different frontend domain
    add_header Access-Control-Allow-Origin "*";
}
